<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Call Brief</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="hero">
        <div class="badge">CSM Intelligence Tool</div>
        <h1>Know Before<br>You <span class="accent">Call.</span></h1>
        <p class="subtitle">Enter a company name and get a real-time news brief before your next customer call.</p>

        <form action="/results" method="POST" class="search-form" id="search-form">
            <div class="input-wrapper">
                <input
                    type="text"
                    name="company"
                    placeholder="e.g. Salesforce..."
                    required
                    autocomplete="off"
                />
                <button type="submit" id="submit-btn">Brief Me</button>
            </div>
        </form>

        <div class="disclaimer">
            <p>Powered by NewsAPI · Built for Customer Success professionals</p>
        </div>
    </div>

    <footer>
        <p>Built with Python, Flask & NewsAPI by <span>Ghaleb Khadra</span> &middot; {{ current_year }}</p>
    </footer>

    <script>
        document.getElementById("search-form").addEventListener("submit", function() {
            const btn = document.getElementById("submit-btn");
            btn.innerHTML = '<span class="spinner"></span>';
            btn.disabled = true;
        });
    </script>

</body>
</html>
